name: Keep Alive — Render API

on:
  schedule:
    - cron: '*/10 7-19 * * 1-5'  # toutes les 10 min, 7h-19h UTC, lun-ven

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Ping API
        run: curl -sf https://boursicot-api.onrender.com/ || echo "API unreachable"
