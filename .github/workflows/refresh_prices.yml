# Rafraîchit les cours OHLCV toutes les 2h entre 10h et minuit heure de Paris.
# Heure de Paris → UTC : été (CEST, UTC+2), hiver (CET, UTC+1)
# On cible l'heure d'été (UTC+2) — 8 déclenchements par jour :
#   10h Paris → 08h UTC
#   12h Paris → 10h UTC
#   14h Paris → 12h UTC
#   16h Paris → 14h UTC
#   18h Paris → 16h UTC
#   20h Paris → 18h UTC
#   22h Paris → 20h UTC
#   00h Paris → 22h UTC

name: Refresh Prices

on:
  schedule:
    - cron: '0 8,10,12,14,16,18,20,22 * * *'   # toutes les 2h, 10h–minuit Paris (heure d'été)
  workflow_dispatch:        # déclenchement manuel depuis l'interface GitHub si besoin

jobs:
  seed-prices:
    name: Seed prices
    runs-on: ubuntu-latest
    timeout-minutes: 10     # le script récent tourne en ~3 min, 10 min = marge large

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'      # met en cache les dépendances pour accélérer les runs suivants

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le seeding des prix
        env:
          SQLALCHEMY_DATABASE_URL: ${{ secrets.SQLALCHEMY_DATABASE_URL }}
        run: python seeds/seed_prices.py
