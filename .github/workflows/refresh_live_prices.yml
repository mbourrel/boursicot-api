# Rafraîchit les prix live (FMP) 2x/jour :
#   - 09h00 Paris — ouverture Euronext
#   - 17h30 Paris — clôture Euronext
#
# Deux créneaux UTC pour couvrir heure d'été (CEST = UTC+2) et d'hiver (CET = UTC+1) :
#   Été  : 07h00 UTC = 09h00 CEST  |  15h30 UTC = 17h30 CEST
#   Hiver: 08h00 UTC = 09h00 CET   |  16h30 UTC = 17h30 CET
#
# Budget : 64 tickers × 2 runs actifs = 128 calls FMP/jour (limite : 250)

name: Refresh Live Prices (FMP)

on:
  schedule:
    - cron: '0 7 * * 1-5'    # 09h00 Paris heure d'été  (lun-ven)
    - cron: '0 8 * * 1-5'    # 09h00 Paris heure d'hiver (lun-ven)
    - cron: '30 15 * * 1-5'  # 17h30 Paris heure d'été  (lun-ven)
    - cron: '30 16 * * 1-5'  # 17h30 Paris heure d'hiver (lun-ven)
  workflow_dispatch:          # déclenchement manuel depuis GitHub si besoin

jobs:
  seed-live-prices:
    name: Seed live prices via FMP
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le seed live prices
        env:
          SQLALCHEMY_DATABASE_URL: ${{ secrets.SQLALCHEMY_DATABASE_URL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python seeds/seed_live_prices.py
